name: Enviar avisos de viajes

on:
  schedule:
    - cron: '*/5 * * * *'    # cada 5 minutos (mínimo que permite GitHub; puede retrasarlo unos min)
  workflow_dispatch:          # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write             # para guardar el estado de "ya enviado"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: notifier
        run: npm install

      - name: Enviar notificaciones pendientes
        working-directory: notifier
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
        run: node send.js

      - name: Guardar cambios (estado de envíos / limpieza)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Actualizar estado de avisos [skip ci]"
          git push
